<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My 연차관리</title>
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/calendar.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/calendar.png">
    <meta name="apple-mobile-web-app-title" content="My 연차관리">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #F2F4F6; color: #191F28; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s; letter-spacing: -0.01em; }
        .dark body { background-color: #000000; color: #ffffff; }
        .toss-card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 12px; }
        .dark .toss-card { background: #1C1C1E; }
        .toss-input { background: #F2F4F6; border-radius: 18px; height: 56px; padding: 0 20px; font-size: 16px; width: 100%; border: none; outline: none; appearance: none; box-sizing: border-box; }
        .dark .toss-input { background: #2C2C2E; color: white; }
        
        .toss-button { background: #3182F6; color: white; border-radius: 18px; height: 56px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; width: 100%; transition: 0.2s; border: none; cursor: pointer; }
        .toss-button:active { transform: scale(0.96); opacity: 0.9; }
        .toss-button-grey { background: #E8EAED; color: #4E5968; }
        .dark .toss-button-grey { background: #3A3A3C; color: #AFB8C1; }
        
        .type-btn { background-color: #F2F4F6; color: #8B95A1; transition: all 0.2s; }
        .dark .type-btn { background-color: #2C2C2E; color: #8B95A1; }
        .type-btn.active { background-color: #3182F6 !important; color: white !important; font-weight: 700; }

        .apple-switch { position: relative; display: inline-block; width: 51px; height: 31px; }
        .apple-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #E9E9EB; transition: .3s; border-radius: 31px; }
        .dark .slider { background-color: #39393D; }
        .slider:before { position: absolute; content: ""; height: 27px; width: 27px; left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 3px 8px rgba(0,0,0,0.12); }
        input:checked + .slider { background-color: #3182F6; }
        input:checked + .slider:before { transform: translateX(20px); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); display: flex; padding: 8px 0 34px 0; border-top: 0.5px solid #E5E7EB; z-index: 100; }
        .dark .bottom-nav { background: rgba(28, 28, 30, 0.85); border-top: 0.5px solid #38383A; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #B0B8C1; font-weight: 600; gap: 4px; }
        .nav-item.active { color: #333D4B; }
        .dark .nav-item.active { color: #ffffff; }
        .nav-icon-svg { width: 26px; height: 26px; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; fill: none; stroke: currentColor; }
        
        #detailPanel { position: fixed; bottom: -100%; left: 0; right: 0; background: white; border-radius: 32px 32px 0 0; padding: 32px 24px 50px; z-index: 200; transition: bottom 0.35s cubic-bezier(0.1, 0.7, 0.1, 1); max-height: 85vh; overflow-y: auto; }
        .dark #detailPanel { background: #1C1C1E; }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }
        
        .tab-content { display: none; padding: 0 20px 120px 20px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .dot { width: 4px; height: 4px; border-radius: 50%; }
        .history-item { border-bottom: 0.5px solid #F2F4F6; padding-bottom: 12px; margin-bottom: 12px; }
        .dark .history-item { border-bottom: 0.5px solid #2C2C2E; }
        .history-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        .color-circle { width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1px #E5E7EB; cursor: pointer; padding: 0; background: none; }
        .dark .color-circle { box-shadow: 0 0 0 1px #38383A; }
        .section-title { font-size: 13px; font-weight: 700; color: #8B95A1; margin-left: 8px; margin-bottom: 10px; text-transform: uppercase; }
        .section-wrapper { margin-bottom: 32px; }
        
        /* 하늘색 박스 스타일 공통 */
        .info-box-blue { background-color: rgba(49, 130, 246, 0.1); border-radius: 16px; padding: 12px 16px; margin-bottom: 24px; }
        .dark .info-box-blue { background-color: rgba(49, 130, 246, 0.15); }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeDetail()"></div>
    <div id="detailPanel">
        <div id="detailContent"></div>
        <button onclick="closeDetail()" class="toss-button toss-button-grey mt-8">닫기</button>
    </div>

    <div class="pt-14 max-w-md mx-auto">
        <div id="tab-home" class="tab-content active">
            <h1 class="text-[26px] font-bold mb-8">My 연차관리</h1>
            
            <div class="toss-card shadow-sm">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm text-[#6B7684] font-medium mb-1 tracking-tight">사용 가능한 연차</p>
                        <div class="flex items-baseline gap-1">
                            <span id="remainDisplay" class="text-[42px] font-bold tracking-tight leading-none">0</span>
                            <span class="text-xl font-bold text-[#ADB5BD]">일</span>
                        </div>
                    </div>
                    <button onclick="showAllowanceCalc()" class="w-10 h-10 flex items-center justify-center bg-[#F2F4F6] dark:bg-[#2C2C2E] rounded-full text-[#ADB5BD] active:text-[#3182F6] transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M4 7V4a2 2 0 012-2h12a2 2 0 012 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2v-3M9 22v-4M15 22v-4M8 7h8M8 11h8M8 15h3"/></svg>
                    </button>
                </div>
                <div class="flex gap-10 mt-5 pt-7 pb-2 border-t border-[#F2F4F6] dark:border-[#2C2C2E]">
                    <div><p class="text-[11px] text-[#8B95A1] font-bold mb-1.5 uppercase tracking-wider">총 연차</p><p id="totalDisplay" class="text-[17px] font-bold text-[#333D4B] dark:text-white">0</p></div>
                    <div><p class="text-[11px] font-bold mb-1.5 uppercase tracking-wider text-red-500">사용 연차</p><p id="usedDisplay" class="text-[17px] font-bold text-red-500">0</p></div>
                </div>
            </div>

            <div class="toss-card p-5 mb-4">
                <div class="flex justify-between items-center mb-6 px-1">
                    <h2 id="calendarTitle" class="font-bold text-[18px]">로드 중...</h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center text-[#B0B8C1] active:opacity-50"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"></path></svg></button>
                        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center text-[#B0B8C1] active:opacity-50"><svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l6 6-6 6"></path></svg></button>
                    </div>
                </div>
                <div class="grid grid-cols-7 text-[12px] font-bold text-[#B0B8C1] mb-2 text-center uppercase tracking-tighter">
                    <div class="text-[#FF4D4D]">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                </div>
                <div id="calendarDays" class="grid grid-cols-7 gap-y-1"></div>
            </div>

            <div class="px-6 py-2 text-center space-y-1">
                <p id="calcModeInfo" class="text-[11px] text-[#B0B8C1] font-bold tracking-tight uppercase">산정 기준: 로드 중...</p>
                <p id="periodDisplayInfo" class="text-[10px] text-[#B0B8C1] font-medium tracking-tight">기간: ...</p>
            </div>
        </div>

        <div id="tab-add" class="tab-content">
            <h1 class="text-[26px] font-bold mb-6">등록</h1>
            <div class="toss-card space-y-7">
                <div><label class="block text-xs font-bold text-[#8B95A1] mb-3 ml-1">언제 쉬시나요?</label><input type="date" id="leaveDate" class="toss-input"></div>
                <div><label class="block text-xs font-bold text-[#8B95A1] mb-3 ml-1">얼마나 쉬시나요?</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setType(1)" id="btn-1" class="type-btn toss-input font-bold justify-center">연차</button>
                        <button onclick="setType(0.5)" id="btn-0.5" class="type-btn toss-input font-bold justify-center">반차</button>
                        <button onclick="setType(0.25)" id="btn-0.25" class="type-btn toss-input font-bold justify-center">반반차</button>
                    </div>
                </div>
                <div><label class="block text-xs font-bold text-[#8B95A1] mb-3 ml-1">사유</label><input type="text" id="leaveMemo" class="toss-input" placeholder="어디 가시나요?"></div>
                <button onclick="saveLeave()" class="toss-button mt-4 shadow-sm">등록하기</button>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-[26px] font-bold">내역</h1>
                <select id="historyYearFilter" onchange="render()" class="bg-transparent text-sm font-bold text-[#3182F6] outline-none"></select>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <div id="tab-more" class="tab-content">
            <h1 class="text-[26px] font-bold mb-8">더보기</h1>
            
            <div class="section-wrapper">
                <div class="section-title">개인 설정</div>
                <div class="toss-card px-6 py-5">
                    <div class="flex justify-between items-center mb-6"><span class="font-bold text-[17px]">다크 모드</span><label class="apple-switch"><input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()"><span class="slider"></span></label></div>
                    <div class="flex justify-between items-center mb-4"><span class="font-bold text-[17px]">회계연도 기준</span><label class="apple-switch"><input type="checkbox" id="fiscalToggle" onchange="toggleFiscal()"><span class="slider"></span></label></div>
                    
                    <div class="info-box-blue">
                        <p id="fiscalHelpText" class="text-[11px] text-[#3182F6] font-bold">꺼짐: 입사일 기준 초기화 (기본)</p>
                    </div>

                    <label class="block text-xs font-bold text-[#8B95A1] mb-3 ml-1 uppercase">입사일 설정</label>
                    <input type="date" id="joinDateInput" onchange="updateJoinDate()" class="toss-input">
                </div>
            </div>

            <div class="section-wrapper">
                <div class="section-title">캘린더 테마</div>
                <div class="toss-card px-6 py-5">
                    <div class="flex justify-between items-center mb-6"><span class="font-bold text-[17px]">컬러 커스텀</span><button onclick="resetColorsWithConfirm()" class="text-[11px] font-bold text-[#8B95A1] border border-[#E5E7EB] px-2 py-1 rounded-md">기본값 복구</button></div>
                    <div class="grid grid-cols-3 gap-4 mb-2">
                        <div class="flex flex-col items-center gap-2"><input type="color" id="color-1" onchange="updateColors()" class="color-circle"><span class="text-[11px] font-bold text-[#8B95A1]">연차</span></div>
                        <div class="flex flex-col items-center gap-2"><input type="color" id="color-0.5" onchange="updateColors()" class="color-circle"><span class="text-[11px] font-bold text-[#8B95A1]">반차</span></div>
                        <div class="flex flex-col items-center gap-2"><input type="color" id="color-0.25" onchange="updateColors()" class="color-circle"><span class="text-[11px] font-bold text-[#8B95A1]">반반차</span></div>
                    </div>
                </div>
            </div>
            
            <div class="section-wrapper">
                <div class="section-title">수동 설정</div>
                <div class="toss-card space-y-7 px-6 py-5">
                    <div>
                        <span class="font-bold text-[17px] block mb-3">연차 수동 조정</span>
                        
                        <div class="info-box-blue">
                            <p class="text-[11px] text-[#3182F6] font-bold">연차를 추가하거나 차감할 수 있어요.</p>
                        </div>

                        <div class="space-y-4">
                            <input type="number" id="manualValue" step="0.25" placeholder="조정 일수 (예: 1.5)" class="toss-input" oninput="checkManualInputs()">
                            <input type="text" id="manualMemo" placeholder="조정 사유" class="toss-input" oninput="checkManualInputs()">
                        </div>
                    </div>
                    <button id="addManualBtn" onclick="addManualAdjustment()" class="toss-button toss-button-grey">내역 추가</button>
                    <button onclick="showManualHistoryPopup()" class="w-full py-2 text-[13px] text-[#8B95A1] font-medium border-t border-[#F2F4F6] dark:border-[#2C2C2E] pt-4">연차 수동 조정 내역 확인</button>
                </div>
            </div>

            <div class="section-wrapper">
                <div class="section-title">데이터 관리</div>
                <div class="toss-card space-y-4 px-6 py-5">
                    <div class="grid grid-cols-2 gap-3"><button onclick="exportToCSV()" class="toss-button toss-button-grey !h-[48px] !text-[13px]">백업 내보내기</button><button onclick="document.getElementById('csvInput').click()" class="toss-button toss-button-grey !h-[48px] !text-[13px]">백업 불러오기</button><input type="file" id="csvInput" accept=".csv" class="hidden" onchange="importFromCSV(event)"></div>
                    <button onclick="resetAllData()" class="toss-button !bg-red-500 !text-white !h-[48px] !text-[13px]">전체 데이터 초기화</button>
                </div>
            </div>
            
            <div class="px-6 py-4 text-center"><p class="text-[11px] text-[#B0B8C1] font-bold tracking-widest uppercase">Version 1.5.2</p></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showTab('home')" class="nav-item active" id="nav-home"><svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg><span>현황</span></div>
        <div onclick="showTab('add')" class="nav-item" id="nav-add"><svg class="nav-icon-svg" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><span>등록</span></div>
        <div onclick="showTab('history')" class="nav-item" id="nav-history"><svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/></svg><span>내역</span></div>
        <div onclick="showTab('more')" class="nav-item" id="nav-more"><svg class="nav-icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg><span>더보기</span></div>
    </nav>

    <script>
        let leaveHistory = JSON.parse(localStorage.getItem('leaveHistory')) || [];
        let manualAdjustments = JSON.parse(localStorage.getItem('manualAdjustments')) || [];
        let config = JSON.parse(localStorage.getItem('appConfig')) || { dark: false, fiscal: false };
        const defaultColors = { "1": "#3b82f6", "0.5": "#fb923c", "0.25": "#4ade80" };
        let colors = JSON.parse(localStorage.getItem('dotColors')) || { ...defaultColors };
        let selectedValue = 1, viewDate = new Date(); 

       // 1. 공휴일 및 대체공휴일 자동 계산기
        const getHolidays = (year) => {
            const holidays = {
                [`${year}-01-01`]: "신정", [`${year}-03-01`]: "삼일절",
                [`${year}-05-01`]: "근로자의 날", [`${year}-05-05`]: "어린이날",
                [`${year}-06-06`]: "현충일", [`${year}-08-15`]: "광복절",
                [`${year}-10-03`]: "개천절", [`${year}-10-09`]: "한글날",
                [`${year}-12-25`]: "성탄절"
            };
        
            const lunarData = {
                2024: { seol: '2024-02-10', bucheo: '2024-05-15', chuseok: '2024-09-17' },
                2025: { seol: '2025-01-29', bucheo: '2025-05-05', chuseok: '2025-10-06' },
                2026: { seol: '2026-02-17', bucheo: '2026-05-24', chuseok: '2026-09-25' },
                2027: { seol: '2027-02-06', bucheo: '2027-05-13', chuseok: '2027-09-15' },
                2028: { seol: '2028-01-26', bucheo: '2028-05-02', chuseok: '2028-10-03' },
                2029: { seol: '2029-02-13', bucheo: '2029-05-20', chuseok: '2029-09-22' },
                2030: { seol: '2030-02-03', bucheo: '2030-05-09', chuseok: '2030-09-12' }
            };
        
            if (lunarData[year]) {
                const {seol, bucheo, chuseok} = lunarData[year];
                holidays[bucheo] = "부처님오신날";
                [seol, chuseok].forEach(base => {
                    const d = new Date(base);
                    for(let i=-1; i<=1; i++) {
                        const t = new Date(d); t.setDate(d.getDate()+i);
                        const tStr = t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0') + '-' + String(t.getDate()).padStart(2, '0');
                        holidays[tStr] = (base===seol?"설날":"추석") + (i===0?"":" 연휴");
                    }
                });
            }
        
            // [핵심] 대체공휴일 로직 보강
            // 설/추석/어린이날/국경일이 토/일과 겹칠 경우 다음 평일 하루를 대체공휴일로 지정
            const holidayKeys = Object.keys(holidays).sort();
            holidayKeys.forEach(h => {
                const d = new Date(h);
                const day = d.getDay(); // 0:일, 6:토
                if (day === 0 || day === 6) {
                    let alt = new Date(d);
                    let moveCount = (day === 0) ? 1 : 2; // 일요일이면 월요일로(+1), 토요일이면 월요일로(+2)
                    
                    // 국경일(3.1, 8.15, 10.3, 10.9), 설/추석 연휴, 어린이날만 대체공휴일 적용 대상 (법령 기준)
                    const isTarget = h.includes('-03-01') || h.includes('-08-15') || h.includes('-10-03') || h.includes('-10-09') || 
                                     h.includes('-05-05') || holidays[h].includes('설날') || holidays[h].includes('추석');
        
                    if (isTarget) {
                        alt.setDate(d.getDate() + moveCount);
                        const altStr = alt.getFullYear() + '-' + String(alt.getMonth() + 1).padStart(2, '0') + '-' + String(alt.getDate()).padStart(2, '0');
                        if (!holidays[altStr]) holidays[altStr] = "대체공휴일";
                        else { // 이미 다른 공휴일이 있다면 그 다음날로
                           alt.setDate(alt.getDate() + 1);
                           const finalStr = alt.getFullYear() + '-' + String(alt.getMonth() + 1).padStart(2, '0') + '-' + String(alt.getDate()).padStart(2, '0');
                           if (!holidays[finalStr]) holidays[finalStr] = "대체공휴일";
                        }
                    }
                }
            });
            return holidays;
        };

        function init() {
            document.getElementById('leaveDate').value = new Date().toISOString().split('T')[0];
            if(config.dark) document.documentElement.classList.add('dark');
            document.getElementById('darkModeToggle').checked = config.dark;
            document.getElementById('fiscalToggle').checked = config.fiscal;
            updateFiscalHelpText(config.fiscal);
            if(localStorage.getItem('joinDate')) document.getElementById('joinDateInput').value = localStorage.getItem('joinDate');
            document.getElementById('color-1').value = colors["1"];
            document.getElementById('color-0.5').value = colors["0.5"];
            document.getElementById('color-0.25').value = colors["0.25"];
            const yearFilter = document.getElementById('historyYearFilter');
            yearFilter.innerHTML = '';
            for(let y = new Date().getFullYear() + 2; y >= 2024; y--) {
                const opt = document.createElement('option'); opt.value = y; opt.innerText = y + '년';
                yearFilter.appendChild(opt);
            }
            yearFilter.value = new Date().getFullYear();
            setType(1); render(); checkManualInputs();
        }

        function toggleFiscal() { config.fiscal = !config.fiscal; localStorage.setItem('appConfig', JSON.stringify(config)); updateFiscalHelpText(config.fiscal); render(); }
        function updateFiscalHelpText(isFiscal) { const helpText = document.getElementById('fiscalHelpText'); helpText.innerText = isFiscal ? "켜짐: 매년 1월 1일 초기화" : "꺼짐: 입사일 기준 초기화 (기본)"; }
        function resetColorsWithConfirm() { if(confirm('컬러를 초기화할까요?')) { colors = { ...defaultColors }; localStorage.setItem('dotColors', JSON.stringify(colors)); document.getElementById('color-1').value = colors["1"]; document.getElementById('color-0.5').value = colors["0.5"]; document.getElementById('color-0.25').value = colors["0.25"]; render(); } }
        function updateColors() { colors["1"] = document.getElementById('color-1').value; colors["0.5"] = document.getElementById('color-0.5').value; colors["0.25"] = document.getElementById('color-0.25').value; localStorage.setItem('dotColors', JSON.stringify(colors)); render(); }
        function showTab(tabName) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.getElementById('tab-' + tabName).classList.add('active'); document.getElementById('nav-' + tabName).classList.add('active'); render(); }
        function toggleDarkMode() { config.dark = !config.dark; document.documentElement.classList.toggle('dark'); localStorage.setItem('appConfig', JSON.stringify(config)); }
        function setType(val) { selectedValue = val; document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + val).classList.add('active'); }

        function getPeriodRange() {
            const joinDateStr = localStorage.getItem('joinDate');
            if(!joinDateStr) return { start: new Date(viewDate.getFullYear(), 0, 1), end: new Date(viewDate.getFullYear(), 11, 31) };
            const join = new Date(joinDateStr), currentYear = viewDate.getFullYear();
            if(config.fiscal) return { start: new Date(currentYear, 0, 1), end: new Date(currentYear, 11, 31) };
            let start = new Date(currentYear, join.getMonth(), join.getDate());
            if (start > viewDate) start = new Date(currentYear - 1, join.getMonth(), join.getDate());
            return { start, end: new Date(start.getFullYear() + 1, start.getMonth(), start.getDate() - 1) };
        }

        function render() {
            const range = getPeriodRange(), fmtDate = (d) => `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
            document.getElementById('periodDisplayInfo').innerText = `기간: ${fmtDate(range.start)} ~ ${fmtDate(range.end)}`;
            document.getElementById('calcModeInfo').innerText = `산정 기준: ${config.fiscal ? "회계연도 기준" : "입사일 기준"}`;
            const joinDateStr = localStorage.getItem('joinDate');
            let total = 0;
            if(joinDateStr) {
                const join = new Date(joinDateStr), diffYears = range.start.getFullYear() - join.getFullYear();
                if(config.fiscal) total = diffYears === 0 ? Math.max(0, range.end.getMonth() - join.getMonth()) : 15 + Math.floor((diffYears - 1) / 2);
                else total = diffYears < 1 ? 11 : 15 + Math.floor((diffYears - 1) / 2);
            }
            const used = leaveHistory.filter(h => { const d = new Date(h.date); return d >= range.start && d <= range.end; }).reduce((s, i) => s + i.val, 0);
            const manual = manualAdjustments.filter(m => { const d = new Date(m.date); return d >= range.start && d <= range.end; }).reduce((s, i) => s + i.val, 0);
            const fmt = (n) => parseFloat(n.toFixed(2));
            document.getElementById('remainDisplay').innerText = fmt(total + manual - used);
            document.getElementById('totalDisplay').innerText = fmt(total + manual);
            document.getElementById('usedDisplay').innerText = fmt(used);
            const filterYear = parseInt(document.getElementById('historyYearFilter').value);
            const filteredHistory = leaveHistory.filter(h => new Date(h.date).getFullYear() === filterYear).sort((a, b) => new Date(b.date) - new Date(a.date));
            document.getElementById('historyList').innerHTML = filteredHistory.map(item => `<div class="toss-card flex justify-between items-center"><div><div class="font-bold text-[17px]">${item.date.replace(/-/g,'.')}</div><div class="text-sm text-[#8B95A1]">${item.memo}</div></div><div class="flex items-center gap-4"><span class="text-red-500 font-bold">-${fmt(item.val)}</span><button onclick="deleteLeave(${leaveHistory.indexOf(item)})" class="text-gray-300 px-2 text-xl">✕</button></div></div>`).join('') || `<p class="text-center text-gray-400 py-10">내역이 없습니다.</p>`;
            renderCalendar();
        }

        function renderCalendar() {
            const year = viewDate.getFullYear(), month = viewDate.getMonth(), holidays = getHolidays(year);
            document.getElementById('calendarTitle').innerText = `${year}.${month + 1}`;
            const firstDay = new Date(year, month, 1).getDay(), lastDate = new Date(year, month + 1, 0).getDate();
            let daysHtml = '';
            
            for (let i = 0; i < firstDay; i++) daysHtml += '<div></div>';
            
            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month, d).getDay();
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                const hName = holidays[dateStr];
                const dayLeaves = leaveHistory.filter(h => h.date === dateStr);
                
                let dots = ''; 
                dayLeaves.forEach(l => { 
                    dots += `<div class="dot" style="background-color: ${colors[String(l.val)]}"></div>`; 
                });
        
                daysHtml += `
                    <div class="aspect-square flex flex-col items-center justify-center text-[15px] relative cursor-pointer" onclick="showDayDetail('${dateStr}', '${hName || ''}')">
                        ${isToday ? '<div class="absolute inset-[6px] bg-blue-50 dark:bg-blue-900/40 rounded-full -z-10 border border-blue-100 dark:border-blue-800"></div>' : ''}
                        <span class="${isToday ? 'text-blue-600 font-bold' : (dayOfWeek === 0 || hName ? 'text-red-500' : (dayOfWeek === 6 ? 'text-blue-400' : ''))}">${d}</span>
                        <div class="flex gap-0.5 mt-0.5 h-1">${dots}</div>
                    </div>`;
            }
            document.getElementById('calendarDays').innerHTML = daysHtml;
        }

        function saveLeave() {
            const date = document.getElementById('leaveDate').value, memo = document.getElementById('leaveMemo').value || "정기 연차";
            leaveHistory.push({ date, val: selectedValue, memo }); localStorage.setItem('leaveHistory', JSON.stringify(leaveHistory));
            document.getElementById('leaveMemo').value = ''; render(); showTab('home');
        }

        function updateJoinDate() { localStorage.setItem('joinDate', document.getElementById('joinDateInput').value); render(); }
        function checkManualInputs() { const v = document.getElementById('manualValue').value, m = document.getElementById('manualMemo').value, b = document.getElementById('addManualBtn'); if(v && m) b.className = 'toss-button'; else b.className = 'toss-button toss-button-grey'; }
        
        function addManualAdjustment() { 
            const v = parseFloat(document.getElementById('manualValue').value), m = document.getElementById('manualMemo').value;
            if(isNaN(v) || !m) return;
            manualAdjustments.push({ val: v, memo: m, date: new Date().toISOString().split('T')[0] });
            localStorage.setItem('manualAdjustments', JSON.stringify(manualAdjustments));
            document.getElementById('manualValue').value = ''; document.getElementById('manualMemo').value = ''; checkManualInputs(); render(); alert('조정 완료!');
        }

function showAllowanceCalc() {
            const remain = parseFloat(document.getElementById('remainDisplay').innerText);
            // 저장된 값 불러오기
            const savedSalary = localStorage.getItem('calcSalaryValue') || '';
            const savedBonus = localStorage.getItem('calcBonusValue') || '';
            const savedAllow = localStorage.getItem('calcAllowValue') || '';
            const savedHours = localStorage.getItem('calcHoursValue') || '209';

            let content = `
                <h3 class="text-[22px] font-bold mb-2">연차 수당 계산기</h3>
                <p class="text-sm text-[#8B95A1] mb-6">남은 연차 <b class="text-[#3182F6]">${remain}일</b> 기준</p>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-[#8B95A1] mb-2 ml-1 uppercase">기본 월급 (세전)</label>
                        <input type="number" id="calcSalary" class="toss-input" placeholder="예: 3,000,000" value="${savedSalary}" oninput="calcAllowance()">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-[#8B95A1] mb-2 ml-1 uppercase">연간 정기상여금</label>
                            <input type="number" id="calcBonus" class="toss-input" placeholder="연 총합" value="${savedBonus}" oninput="calcAllowance()">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-[#8B95A1] mb-2 ml-1 uppercase">고정 수당 (월)</label>
                            <input type="number" id="calcAllow" class="toss-input" placeholder="식대 등" value="${savedAllow}" oninput="calcAllowance()">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-[#8B95A1] mb-2 ml-1 uppercase">월 소정 근무시간</label>
                        <input type="number" id="calcHours" class="toss-input" value="${savedHours}" oninput="calcAllowance()">
                        <p class="text-[10px] text-[#B0B8C1] mt-1 ml-1">* 주 40시간 근무자 보통 209시간</p>
                    </div>
                    
                    <div class="bg-[#F9FAFB] dark:bg-[#2C2C2E] p-6 rounded-3xl border border-[#F2F4F6] dark:border-[#3A3A3C]">
                        <div class="flex justify-between items-center mb-4 pb-4 border-b border-[#EEE] dark:border-[#3A3A3C]">
                            <span class="text-[13px] text-[#6B7684] font-medium">통상 시급</span>
                            <span id="hourlyWage" class="text-[15px] font-bold">0원</span>
                        </div>
                        <div class="flex justify-between items-center mb-6">
                            <span class="text-[13px] text-[#6B7684] font-medium">통상 일급 (8h)</span>
                            <span id="dailyWage" class="text-[15px] font-bold">0원</span>
                        </div>
                        
                        <p class="text-[13px] text-[#6B7684] mb-1 font-medium text-center">예상 총 수당 (미사용 연차분)</p>
                        <p id="calcResult" class="text-[32px] font-bold text-[#3182F6] text-center tracking-tight">0원</p>
                    </div>

                    <div class="px-2 py-2">
                        <ul class="text-[11px] text-[#ADB5BD] leading-relaxed list-disc ml-3">
                            <li>통상임금 = 월급 + (상여금/12) + 고정수당</li>
                            <li>실제 지급액은 회사 규정(취업규칙)에 따라 상이할 수 있습니다.</li>
                            <li class="font-semibold text-[#8B95A1]">법적 증빙 효력이 없는 참고용 계산기입니다.</li>
                        </ul>
                    </div>
                </div>`;
            
            document.getElementById('detailContent').innerHTML = content;
            document.getElementById('overlay').style.display = 'block'; 
            document.getElementById('detailPanel').style.bottom = '0';
            calcAllowance(); 
        }

        function calcAllowance() {
            const sVal = document.getElementById('calcSalary').value;
            const bVal = document.getElementById('calcBonus').value;
            const aVal = document.getElementById('calcAllow').value;
            const hVal = document.getElementById('calcHours').value;

            const salary = parseFloat(sVal) || 0;
            const bonus = (parseFloat(bVal) || 0) / 12; // 연간 상여를 월로 환산
            const allowance = parseFloat(aVal) || 0;
            const hours = parseFloat(hVal) || 1;
            const remain = parseFloat(document.getElementById('remainDisplay').innerText);
            
            // 값 저장
            localStorage.setItem('calcSalaryValue', sVal);
            localStorage.setItem('calcBonusValue', bVal);
            localStorage.setItem('calcAllowValue', aVal);
            localStorage.setItem('calcHoursValue', hVal);

            // 통상임금 계산
            const monthlyTotal = salary + bonus + allowance;
            const hourly = monthlyTotal / hours;
            const daily = hourly * 8;
            const totalResult = Math.floor(daily * remain);

            // 화면 표시
            document.getElementById('hourlyWage').innerText = Math.floor(hourly).toLocaleString() + '원';
            document.getElementById('dailyWage').innerText = Math.floor(daily).toLocaleString() + '원';
            document.getElementById('calcResult').innerText = totalResult.toLocaleString() + '원';
        }
        
        function calcAllowance() {
            const sVal = document.getElementById('calcSalary').value, hVal = document.getElementById('calcHours').value;
            localStorage.setItem('calcSalaryValue', sVal); localStorage.setItem('calcHoursValue', hVal);
            const salary = parseFloat(sVal) || 0, hours = parseFloat(hVal) || 1, remain = parseFloat(document.getElementById('remainDisplay').innerText);
            const result = Math.floor((salary / hours) * 8 * remain);
            document.getElementById('calcResult').innerText = result.toLocaleString() + '원';
        }

        function showManualHistoryPopup() {
            const range = getPeriodRange(), fmt = (n) => parseFloat(n.toFixed(2));
            let content = `<h3 class="text-[20px] font-bold mb-6">산정 기간 조정 내역</h3>`;
            const filtered = manualAdjustments.filter(m => { const d = new Date(m.date); return d >= range.start && d <= range.end; });
            if(filtered.length > 0) {
                filtered.forEach(item => {
                    content += `<div class="flex justify-between items-center history-item"><div><div class="font-bold text-[15px]">${item.memo}</div><div class="text-[11px] text-gray-400">${item.date}</div></div><div class="flex items-center gap-4"><span class="font-bold ${item.val >= 0 ? 'text-[#3182F6]' : 'text-red-500'}">${item.val > 0 ? '+' : ''}${fmt(item.val)}</span><button onclick="deleteManual(${manualAdjustments.indexOf(item)})" class="text-gray-300 px-2 text-xl">✕</button></div></div>`;
                });
            } else content += `<div class="py-12 text-center text-[#8B95A1]">내역이 없습니다.</div>`;
            document.getElementById('detailContent').innerHTML = content;
            document.getElementById('overlay').style.display = 'block'; document.getElementById('detailPanel').style.bottom = '0';
        }

        function showDayDetail(dateStr, hName) {
            const leaves = leaveHistory.filter(h => h.date === dateStr);
            let content = `<h3 class="text-[22px] font-bold mb-2">${dateStr.replace(/-/g, '.')}</h3>`;
            if(hName) content += `<p class="text-red-500 font-bold mb-10">${hName}</p>`; else content += `<div class="mb-10"></div>`;
            if(leaves.length > 0) leaves.forEach(l => { content += `<div class="bg-[#F2F4F6] dark:bg-[#2C2C2E] p-5 rounded-2xl mb-3 flex justify-between items-center"><div><div class="font-bold">${l.memo}</div><div class="text-xs text-[#8B95A1]">${l.val}일 사용</div></div><div class="w-2.5 h-2.5 rounded-full" style="background-color: ${colors[String(l.val)]}"></div></div>`; });
            else content += `<div class="py-12 text-center text-[#8B95A1]">기록이 없습니다.</div>`;
            document.getElementById('detailContent').innerHTML = content;
            document.getElementById('overlay').style.display = 'block'; document.getElementById('detailPanel').style.bottom = '0';
        }

        function changeMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); render(); }
        function deleteLeave(i) { if(confirm('삭제할까요?')) { leaveHistory.splice(i, 1); localStorage.setItem('leaveHistory', JSON.stringify(leaveHistory)); render(); } }
        function deleteManual(i) { if(confirm('삭제할까요?')) { manualAdjustments.splice(i, 1); localStorage.setItem('manualAdjustments', JSON.stringify(manualAdjustments)); render(); closeDetail(); } }
        function closeDetail() { document.getElementById('overlay').style.display = 'none'; document.getElementById('detailPanel').style.bottom = '-100%'; }
        function resetAllData() { if(confirm("초기화할까요?")) { localStorage.clear(); location.reload(); } }

        function exportToCSV() {
            let csv = "유형,날짜,수량,사유\n"; csv += `설정,회계기준,${config.fiscal?1:0},${localStorage.getItem('joinDate')||''}\n`;
            leaveHistory.forEach(h => csv += `연차사용,${h.date},${h.val},${h.memo}\n`); manualAdjustments.forEach(m => csv += `수동조정,${m.date},${m.val},${m.memo}\n`);
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' }); const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.setAttribute("download", `연차백업_${new Date().getFullYear()}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function importFromCSV(event) {
            const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = function(e) {
                const rows = e.target.result.split("\n").slice(1); let nl = [], nm = [];
                rows.forEach(row => { const [t, d, v, m] = row.split(","); if(!t) return; if(t === "설정") { config.fiscal = v=="1"; localStorage.setItem('joinDate', m.trim()); } else if(t === "연차사용") nl.push({ date:d, val:parseFloat(v), memo:m }); else if(t === "수동조정") nm.push({ date:d, val:parseFloat(v), memo:m }); });
                leaveHistory = nl; manualAdjustments = nm; localStorage.setItem('leaveHistory', JSON.stringify(nl)); localStorage.setItem('manualAdjustments', JSON.stringify(nm)); localStorage.setItem('appConfig', JSON.stringify(config)); init(); alert("데이터를 성공적으로 불러왔습니다.");
            };
            reader.readAsText(file);
        }
        init();
    </script>
</body>
</html>
